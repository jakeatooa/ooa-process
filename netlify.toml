# Netlify configuration for the Process card game
# Static site — publish the project root as-is (no build step).

[build]
  publish = "."

# Global security + framing policy.
# X-Frame-Options is kept open (ALLOWALL-equivalent via omission from CSP) so
# the app can later be iframe-embedded in Circle if desired. To lock it down,
# switch to SAMEORIGIN.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Long-cache the card art — content-hashed by filename (60 images x 2).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for the HTML shell so updates ship fast.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
